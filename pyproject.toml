[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autosaxs"
version = "0.1.0"
description = "Interactive SAXS pipeline core: calibration, integration, subtraction, ATSAS descriptors, plots, shape fitting, reports"
requires-python = ">=3.9"
license = "MIT"
authors = []
keywords = ["saxs", "small-angle scattering", "pyFAI", "ATSAS", "calibration", "integration"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "ase>=3.22",
    "fabio",
    "matplotlib>=3.5",
    "numpy>=1.20",
    "pandas>=1.3",
    "pyFAI",
    "PyYAML>=5.4",
    "reportlab>=4.0",
    "scipy>=1.7",
    "scikit-image",
    "scikit-learn>=1.0",
    "seaborn",
    "squarify",
    "customtkinter>=5.0",
    "openai>=1.0",
    "requests",
    "httpx",
]

[project.optional-dependencies]
dev = ["build", "pip"]

[tool.setuptools.packages.find]
where = ["."]
include = ["autosaxs*"]

[tool.setuptools.package-data]
autosaxs = [
    "global/*.yml",
    "global/templates/*",
    "prompts/**/*.txt",
    "pipelines/*.txt",
]

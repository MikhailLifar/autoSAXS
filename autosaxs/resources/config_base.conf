# calibration parameters
calibrant_name: AgBh
r_beam_px: 35
ring_analysis:
  gauss_sigma: 5.0
  div_gmm_components: 5
  div_gmm_prob_main_lt: 0.01
  div_gmm_max_samples: 100000
  div_gmm_seed: 0
  dbscan_eps: 5.0
  dbscan_min_samples: 10
  circle_r2_min: 0.5
  global_refine_bounds_half_width_px: 50.0
  final_max_radius_px: 500.0
  final_skip_first_ring: true
  final_keep_first_ring_if_rout_gap_le_px: 50.0
  final_ring_radial_dr: 0.5
  final_ring_target_width_px: 2.0
  final_keep_smallest_k: 3
  final_interval_overlap_tol_px: 0.0
detector_geometry:
  dist: 0.7
  pixel_size:
  - 0.000172
  - 0.000172
  rot1: 0.0
  rot2: 0.0
  rot3: 0.0
  wavelength: 1.445e-10

# subtraction parameters
sub:
  q_range_abs:
  - 4.0
  - 6.0

# fitting parameters
bodies:
  q_range_nm:
  - null
  - null
  q_range_channels:
  - 1
  - 4

# MIXTURE parameters (all required by fit_mixture)
mixture:
  # Optional fit-range override used by controller (nm^-1). Keep null/null for full range.
  q_range_nm:
  - null
  - null
  maxit: 100
  # Sphere bounds (Angstroms; MIXTURE expects Å)
  r_min: 5.0
  r_max: 120.0
  # Polydispersity sigma bounds (Angstroms)
  poly_min: 0.5
  poly_max: 60.0
  # Fit nph = 1..max_nph (inclusive)
  max_nph: 3
